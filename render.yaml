services:
  - type: web
    name: telegram-webhook-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: TIMEZONE
        value: Asia/Yangon
